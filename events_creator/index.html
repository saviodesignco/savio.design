<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savio Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c9a96e;
      --gold-dim: #8a6f3f;
      --bg:      #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border:  #2a2a2a;
      --text:    #f0ebe3;
      --muted:   #7a7268;
      --danger:  #e05555;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ============================================================
       PASSWORD GATE
       ============================================================ */
    #gate {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2rem; z-index: 999;
      transition: opacity .4s ease;
    }
    #gate.hidden { opacity: 0; pointer-events: none; }

    .gate-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: .15em;
      text-transform: uppercase;
    }
    .gate-sub {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-top: -.5rem;
      text-align: center;
    }
    .gate-form {
      display: flex; flex-direction: column;
      gap: .75rem; width: 280px;
    }
    .gate-form input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      padding: .85rem 1rem;
      border-radius: 6px;
      outline: none;
      text-align: center;
      letter-spacing: .2em;
      transition: border-color .2s;
    }
    .gate-form input:focus { border-color: var(--gold-dim); }
    .gate-form input.shake {
      animation: shake .35s ease;
      border-color: var(--danger);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .btn-primary {
      background: var(--gold);
      color: #0a0a0a;
      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: .85rem 1rem;
      border-radius: 6px;
      transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .85; }

    /* ============================================================
       APP SHELL
       ============================================================ */
    #app { display: none; min-height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    /* ---- NAV ---- */
    nav {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: .12em;
      text-decoration: none;
    }
    .nav-actions { display: flex; gap: .75rem; align-items: center; }
    .btn-sm {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .5rem .9rem;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .btn-sm:hover { border-color: var(--gold-dim); color: var(--text); }
    .btn-new {
      background: var(--gold);
      border-color: var(--gold);
      color: #0a0a0a;
      font-weight: 500;
    }
    .btn-new:hover { opacity: .85; color: #0a0a0a; }

    /* ---- MAIN ---- */
    main { flex: 1; padding: 2.5rem 2rem; max-width: 1100px; width: 100%; margin: 0 auto; }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: .4rem;
    }
    .page-sub { font-size: .8rem; color: var(--muted); margin-bottom: 2rem; }

    /* ---- EVENT GRID ---- */
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.4rem;
      display: flex; flex-direction: column; gap: .6rem;
      transition: border-color .2s;
    }
    .event-card:hover { border-color: var(--gold-dim); }

    .event-card-type {
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .event-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
    }
    .event-card-host { font-size: .8rem; color: var(--muted); }
    .event-card-date { font-size: .78rem; color: var(--muted); }

    .event-card-actions {
      display: flex; gap: .5rem; margin-top: .5rem;
      flex-wrap: wrap;
    }
    .btn-card {
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .45rem .8rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .2s, color .2s;
    }
    .btn-card:hover { border-color: var(--gold-dim); color: var(--text); }
    .btn-card.danger:hover { border-color: var(--danger); color: var(--danger); }

    /* ---- EMPTY STATE ---- */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.8;
    }
    .empty span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--gold-dim);
      margin-bottom: .5rem;
    }

    /* ---- LOADING ---- */
    .loading-bar {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      width: 100%; position: fixed; top: 0; left: 0;
      animation: slide 1.2s linear infinite;
      display: none;
    }
    .loading-bar.active { display: block; }
    @keyframes slide {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* ---- TOAST ---- */
    #toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .8rem;
      padding: .7rem 1.4rem;
      border-radius: 6px;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ---- MODAL ---- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem;
      max-width: 420px; width: 90%;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .modal h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 400;
    }
    .modal p { font-size: .85rem; color: var(--muted); line-height: 1.6; }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; }
  </style>
</head>
<body>

  <!-- Loading bar -->
  <div class="loading-bar" id="loading"></div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- ============================================================
       PASSWORD GATE
       ============================================================ -->
  <div id="gate">
    <div>
      <div class="gate-logo">Savio</div>
      <div class="gate-sub">Event Admin</div>
    </div>
    <form class="gate-form" onsubmit="checkPassword(event)">
      <input type="password" id="pw-input" placeholder="Enter admin password" autocomplete="current-password" />
      <button type="submit" class="btn-primary">Enter</button>
    </form>
  </div>

  <!-- ============================================================
       APP
       ============================================================ -->
  <div id="app">

    <!-- Nav -->
    <nav>
      <a class="nav-logo" href="/">Savio.design</a>
      <div class="nav-actions">
        <a class="btn-sm" href="settings.html">Settings</a>
        <a class="btn-sm btn-new" href="create.html">+ New Event</a>
      </div>
    </nav>

    <!-- Main -->
    <main>
      <div class="page-title">Events</div>
      <div class="page-sub" id="events-count">Loading events…</div>

      <div class="event-grid" id="event-grid">
        <!-- Cards injected by JS -->
      </div>
    </main>

  </div>

  <!-- Confirm delete modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3>Delete event?</h3>
      <p id="delete-msg">This will permanently remove the event folder from GitHub. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-sm" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-sm" id="confirm-delete-btn" style="border-color:var(--danger);color:var(--danger)">Delete</button>
      </div>
    </div>
  </div>

  <script>
    /* ============================================================
       CONFIG — update these to match your GitHub repo
       ============================================================ */
    const ADMIN_CONFIG = {
      password:    'savio2025',          // Change in settings.html
      githubOwner: 'saviodesignco',
      githubRepo:  'savio.design',
      eventsPath:  'events',             // folder in repo root
    };

    /* ============================================================
       PASSWORD GATE
       ============================================================ */
    function checkPassword(e) {
      e.preventDefault();
      const input = document.getElementById('pw-input');
      const pw    = localStorage.getItem('adminPassword') || ADMIN_CONFIG.password;

      if (input.value === pw) {
        sessionStorage.setItem('adminUnlocked', '1');
        document.getElementById('gate').classList.add('hidden');
        setTimeout(() => {
          document.getElementById('gate').style.display = 'none';
          document.getElementById('app').classList.add('visible');
          loadEvents();
        }, 400);
      } else {
        input.classList.add('shake');
        input.value = '';
        setTimeout(() => input.classList.remove('shake'), 400);
      }
    }

    // Auto-unlock if session is active
    window.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem('adminUnlocked') === '1') {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').classList.add('visible');
        loadEvents();
      }
    });

    /* ============================================================
       GITHUB API HELPERS
       ============================================================ */
    function getToken() {
      return localStorage.getItem('githubToken') || '';
    }

    async function githubFetch(path, options = {}) {
      const token = getToken();
      const res = await fetch(`https://api.github.com/repos/${ADMIN_CONFIG.githubOwner}/${ADMIN_CONFIG.githubRepo}/contents/${path}`, {
        ...options,
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        }
      });
      return res;
    }

    /* ============================================================
       LOAD EVENTS
       ============================================================ */
    async function loadEvents() {
      const grid  = document.getElementById('event-grid');
      const count = document.getElementById('events-count');

      if (!getToken()) {
        grid.innerHTML = `<div class="empty"><span>No GitHub token set</span>Go to <a href="settings.html" style="color:var(--gold)">Settings</a> to add your GitHub personal access token.</div>`;
        count.textContent = '';
        return;
      }

      setLoading(true);
      try {
        const res  = await githubFetch(ADMIN_CONFIG.eventsPath);
        const data = await res.json();

        if (!Array.isArray(data)) throw new Error('Could not load events folder');

        // Filter out non-folders and 'template'
        const events = data.filter(f => f.type === 'dir' && f.name !== 'template');

        count.textContent = `${events.length} event${events.length !== 1 ? 's' : ''}`;

        if (events.length === 0) {
          grid.innerHTML = `<div class="empty"><span>No events yet</span>Click "+ New Event" to create your first invitation.</div>`;
          return;
        }

        // Load each event's config to display details
        const cards = await Promise.all(events.map(e => buildCard(e)));
        grid.innerHTML = cards.join('');

      } catch (err) {
        grid.innerHTML = `<div class="empty"><span>Error loading events</span>${err.message}</div>`;
        count.textContent = '';
      } finally {
        setLoading(false);
      }
    }

    async function buildCard(eventFolder) {
      let title    = eventFolder.name;
      let type     = '';
      let host     = '';
      let date     = '';
      const slug   = encodeURIComponent(eventFolder.name);
      const liveUrl = `https://savio.design/events/${slug}/`;

      try {
        const res  = await githubFetch(`${ADMIN_CONFIG.eventsPath}/${eventFolder.name}/index.html`);
        const data = await res.json();
        const html = atob(data.content.replace(/\n/g, ''));

        // Extract EVENT config values with regex
        const get = (key) => {
          const m = html.match(new RegExp(`${key}:\\s*["']([^"']+)["']`));
          return m ? m[1] : '';
        };
        title = get('eventTitle') || title;
        type  = get('eventType');
        host  = get('hostName');
        date  = get('date');
      } catch (_) { /* use folder name as fallback */ }

      return `
        <div class="event-card">
          ${type ? `<div class="event-card-type">${type}</div>` : ''}
          <div class="event-card-title">${title}</div>
          ${host ? `<div class="event-card-host">Hosted by ${host}</div>` : ''}
          ${date ? `<div class="event-card-date">${date}</div>` : ''}
          <div class="event-card-actions">
            <a class="btn-card" href="${liveUrl}" target="_blank">View Live ↗</a>
            <a class="btn-card" href="create.html?event=${encodeURIComponent(eventFolder.name)}">Edit</a>
            <button class="btn-card danger" onclick="confirmDelete('${eventFolder.name.replace(/'/g,"\\'")}')">Delete</button>
          </div>
        </div>`;
    }

    /* ============================================================
       DELETE EVENT
       ============================================================ */
    let pendingDelete = null;

    function confirmDelete(name) {
      pendingDelete = name;
      document.getElementById('delete-msg').textContent =
        `This will permanently delete "${name}" from GitHub. This cannot be undone.`;
      document.getElementById('delete-modal').classList.add('open');
      document.getElementById('confirm-delete-btn').onclick = () => deleteEvent(name);
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('open');
      pendingDelete = null;
    }

    async function deleteEvent(name) {
      closeDeleteModal();
      setLoading(true);
      try {
        // Get both files' SHAs then delete them
        const files = ['index.html', 'admin.html'];
        for (const file of files) {
          const res  = await githubFetch(`${ADMIN_CONFIG.eventsPath}/${name}/${file}`);
          if (!res.ok) continue;
          const data = await res.json();
          await githubFetch(`${ADMIN_CONFIG.eventsPath}/${name}/${file}`, {
            method: 'DELETE',
            body: JSON.stringify({
              message: `Remove event: ${name}`,
              sha: data.sha,
            })
          });
        }
        showToast(`"${name}" deleted`);
        await loadEvents();
      } catch (err) {
        showToast('Error deleting event: ' + err.message);
      } finally {
        setLoading(false);
      }
    }

    /* ============================================================
       UI HELPERS
       ============================================================ */
    function setLoading(on) {
      document.getElementById('loading').classList.toggle('active', on);
    }

    function showToast(msg, duration = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }
  </script>
</body>
</html>
